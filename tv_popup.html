<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>📺 Live TV</title>
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    @keyframes neonGlow {
        0%   { border-bottom-color: #ff0000; }
        33%  { border-bottom-color: #00ff00; }
        66%  { border-bottom-color: #00ffff; }
        100% { border-bottom-color: #ff0000; }
    }

    #tv-bar {
        background: #111;
        display: flex; align-items: center;
        padding: 6px 10px; gap: 8px;
        border-bottom: 2px solid #fff;
        animation: neonGlow 6s infinite linear;
        cursor: move; user-select: none;
        flex-shrink: 0;
    }
    .tv-bar-title {
        background: var(--rainbow); -webkit-background-clip: text; color: transparent;
        font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        flex: 1; text-align: center;
    }
    .tv-btn {
        background: #222; border: 1px solid #444; border-radius: 8px;
        color: #fff; font-size: 13px; cursor: pointer;
        padding: 4px 10px; line-height: 1;
        transition: background 0.15s; white-space: nowrap;
        font-family: 'Arial Black', sans-serif;
    }
    .tv-btn:hover { background: #333; }
    .tv-btn.active { border-color: #ff4444; color: #ff4444; }

    #tv-video {
        display: block; width: 100%; flex: 1;
        background: #000; cursor: pointer;
        min-height: 0;
    }

    #status-msg {
        color: #888; font-size: 10px; text-align: center;
        padding: 3px 0; background: #0a0a0a;
        letter-spacing: 1px; flex-shrink: 0;
    }
</style>
</head>
<body>

<div id="tv-bar">
    <button class="tv-btn" id="btn-play">⏸</button>
    <button class="tv-btn" id="btn-mute">🔊</button>
    <div class="tv-bar-title">📺 LIVE TV</div>
    <button class="tv-btn" id="btn-close">✕ CHIUDI</button>
</div>

<video id="tv-video" playsinline autoplay></video>
<div id="status-msg">Connessione in corso...</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
    var HLS_URL = 'https://videoprova.streamsag.com:8080/hls/aghino/index.m3u8';
    var video = document.getElementById('tv-video');
    var hls = null;

    if (Hls.isSupported()) {
        hls = new Hls({ liveSyncDurationCount: 3, enableWorker: true });
        hls.loadSource(HLS_URL);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
            document.getElementById('status-msg').textContent = '';
        });
        hls.on(Hls.Events.ERROR, function(e, data) {
            if (data.fatal) {
                document.getElementById('status-msg').textContent = '⚠ Errore stream — riprovando...';
                setTimeout(function() { hls.loadSource(HLS_URL); hls.startLoad(); }, 4000);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = HLS_URL;
        video.play();
        document.getElementById('status-msg').textContent = '';
    }

    document.getElementById('btn-play').addEventListener('click', function() {
        if (video.paused) { video.play(); this.textContent = '⏸'; }
        else { video.pause(); this.textContent = '▶'; }
    });
    document.getElementById('btn-mute').addEventListener('click', function() {
        video.muted = !video.muted;
        this.textContent = video.muted ? '🔇' : '🔊';
        this.classList.toggle('active', video.muted);
    });
    document.getElementById('btn-close').addEventListener('click', function() { window.close(); });
    video.addEventListener('click', function() {
        var btn = document.getElementById('btn-play');
        if (video.paused) { video.play(); btn.textContent = '⏸'; }
        else { video.pause(); btn.textContent = '▶'; }
    });
</script>
</body>
</html>
