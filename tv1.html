<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<style>
    :root { --rainbow: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000); }
    body { background: transparent; margin: 0; font-family: 'Arial Black', sans-serif; overflow: hidden; }

    @keyframes neonGlow {
        0%   { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; }
        33%  { border-color: #00ff00; box-shadow: 0 0 12px #00ff00; }
        66%  { border-color: #00ffff; box-shadow: 0 0 12px #00ffff; }
        100% { border-color: #ff0000; box-shadow: 0 0 12px #ff0000; }
    }

    #btn-tv {
        position: fixed; top: 45px; right: 20px;
        width: 210px; height: 55px;
        background: #000; border: 3px solid #fff; border-radius: 15px;
        cursor: pointer; animation: neonGlow 6s infinite linear;
        display: flex; justify-content: center; align-items: center;
        z-index: 99999; transition: transform 0.2s;
    }
    #btn-tv:hover { transform: scale(1.04); }

    .btn-label {
        background: var(--rainbow); -webkit-background-clip: text; color: transparent;
        font-weight: 900; font-size: 13px; text-transform: uppercase; text-align: center;
    }

    #video-panel {
        display: none;
        position: fixed; top: 55px; right: 20px;
        width: 310px;
        background: #000; border: 3px solid #fff; border-radius: 15px;
        overflow: hidden; animation: neonGlow 6s infinite linear;
        z-index: 99999;
        transition: width 0.3s, height 0.3s;
    }
    #video-panel.expanded {
        top: 50% !important;
        left: 50% !important;
        right: auto !important;
        transform: translate(-50%, -50%);
        width: 640px !important;
        cursor: move;
    }
    #video-panel.expanded #tv-video {
        height: 360px;
    }
    #video-panel.dragging {
        transition: none;
        cursor: grabbing;
    }

    /* barra top */
    .tv-bar {
        background: #111;
        display: flex; align-items: center;
        padding: 6px 10px; gap: 8px;
    }
    .tv-bar-title {
        background: var(--rainbow); -webkit-background-clip: text; color: transparent;
        font-weight: 900; font-size: 9px; text-transform: uppercase; letter-spacing: 1px;
        flex: 1; text-align: center;
    }
    .tv-btn {
        background: #222; border: 1px solid #444; border-radius: 8px;
        color: #fff; font-size: 13px; cursor: pointer;
        padding: 4px 9px; line-height: 1;
        transition: background 0.15s; white-space: nowrap;
        font-family: 'Arial Black', sans-serif;
    }
    .tv-btn:hover { background: #333; }
    .tv-btn.active { border-color: #ff4444; color: #ff4444; }

    /* video */
    #tv-video {
        display: block; width: 100%; height: 225px;
        background: #000; cursor: pointer;
    }

    #live-badge {
        background: #ff2222; color: #fff;
        font-size: 10px; font-weight: 900; letter-spacing: 1px;
        padding: 2px 7px; border-radius: 5px;
        text-transform: uppercase;
    }

    #status-msg {
        color: #888; font-size: 10px; text-align: center;
        padding: 3px 0; background: #0a0a0a;
        letter-spacing: 1px; font-family: Arial, sans-serif;
    }
</style>
</head>
<body>

    <div id="btn-tv">
        <div class="btn-label">📺 GUARDA LA NOSTRA TV</div>
    </div>

    <div id="video-panel">

        <!-- barra superiore -->
        <div class="tv-bar">
            <button class="tv-btn" id="close-tv">✕ CHIUDI</button>
            <div class="tv-bar-title">📺 LIVE TV</div>
            <button class="tv-btn" id="btn-play-top">⏸</button>
            <button class="tv-btn" id="btn-mute-top">🔊</button>
            <button class="tv-btn" id="btn-fullscreen">⛶</button>
        </div>

        <video id="tv-video" playsinline autoplay></video>

        <div id="status-msg">Connessione in corso...</div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script>
    var HLS_URL = 'https://videoprova.streamsag.com:8080/hls/aghino/index.m3u8';
    var video = document.getElementById('tv-video');
    var hls = null;

    function initPlayer() {
        document.getElementById('status-msg').textContent = 'Connessione in corso...';

        if (Hls.isSupported()) {
            hls = new Hls({ liveSyncDurationCount: 3, enableWorker: true });
            hls.loadSource(HLS_URL);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
                document.getElementById('status-msg').textContent = '';
            });
            hls.on(Hls.Events.ERROR, function(e, data) {
                if (data.fatal) {
                    document.getElementById('status-msg').textContent = '⚠ Errore stream — riprovando...';
                    setTimeout(initPlayer, 4000);
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari nativo
            video.src = HLS_URL;
            video.play();
            document.getElementById('status-msg').textContent = '';
        } else {
            document.getElementById('status-msg').textContent = '⚠ Browser non supportato';
        }
    }

    function destroyPlayer() {
        if (hls) { hls.destroy(); hls = null; }
        video.pause();
        video.src = '';
        document.getElementById('status-msg').textContent = '';
    }

    function setPlayState(playing) {
        document.getElementById('btn-play-top').textContent = playing ? '⏸' : '▶';
    }
    function setMuteState(muted) {
        document.getElementById('btn-mute-top').textContent = muted ? '🔇' : '🔊';
        document.getElementById('btn-mute-top').classList.toggle('active', muted);
    }

    function togglePlay() {
        if (video.paused) { video.play(); setPlayState(true); }
        else { video.pause(); setPlayState(false); }
    }
    function toggleMute() {
        video.muted = !video.muted;
        setMuteState(video.muted);
    }

    document.getElementById('btn-tv').addEventListener('click', function() {
        this.style.display = 'none';
        document.getElementById('video-panel').style.display = 'block';
        initPlayer();
    });

    document.getElementById('close-tv').addEventListener('click', function() {
        destroyPlayer();
        document.getElementById('video-panel').style.display = 'none';
        document.getElementById('btn-tv').style.display = 'flex';
    });

    document.getElementById('btn-play-top').addEventListener('click', togglePlay);
    document.getElementById('btn-mute-top').addEventListener('click', toggleMute);
    // expanded + draggable
    var isExpanded = false;
    var panel = document.getElementById('video-panel');
    var dragOffX, dragOffY, isDragging = false;

    document.getElementById('btn-fullscreen').addEventListener('click', function() {
        isExpanded = !isExpanded;
        if (isExpanded) {
            // centra e allarga
            var rect = panel.getBoundingClientRect();
            panel.style.right = 'auto';
            panel.style.top = (window.innerHeight / 2 - 200) + 'px';
            panel.style.left = (window.innerWidth / 2 - 320) + 'px';
            panel.style.width = '640px';
            panel.style.transform = 'none';
            video.style.height = '360px';
            this.textContent = '⊡';
        } else {
            panel.style.right = '20px';
            panel.style.top = '55px';
            panel.style.left = 'auto';
            panel.style.width = '310px';
            panel.style.transform = '';
            video.style.height = '225px';
            this.textContent = '⛶';
        }
    });

    // drag dalla barra
    document.querySelector('.tv-bar').addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        if (!isExpanded) return;
        isDragging = true;
        var rect = panel.getBoundingClientRect();
        dragOffX = e.clientX - rect.left;
        dragOffY = e.clientY - rect.top;
        panel.classList.add('dragging');
        e.preventDefault();
    });

    document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        panel.style.left = (e.clientX - dragOffX) + 'px';
        panel.style.top  = (e.clientY - dragOffY) + 'px';
    });

    document.addEventListener('mouseup', function() {
        isDragging = false;
        panel.classList.remove('dragging');
    });

    // click sul video = play/pausa
    video.addEventListener('click', togglePlay);
</script>

</body>
</html>
